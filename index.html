<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Galería Pro</title>
    <style>
        :root {
            --bg-puro: #0f0f11;
            --bg-tarjeta: #18181c;
            --bg-sheet: #1f1f23;
            --texto: #ffffff;
            --texto-muted: #a1a1aa;
            --pinterest-red: #e60023;
            --pinterest-hover: #cc001f;
            --corazon: #ff0040;
            --estrella: #eab308;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-puro); color: var(--texto);
            padding: 15px 10px 100px 10px; min-height: 100vh; overflow-x: hidden;
        }

        @keyframes pulse { 0% { background-color: #1a1a1f; } 50% { background-color: #26262b; } 100% { background-color: #1a1a1f; } }
        .skeleton { animation: pulse 1.5s infinite ease-in-out; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px 10px; max-width: 1400px; margin: 0 auto; }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; background: var(--pinterest-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; }
        .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .header-icons { display: flex; gap: 15px; }
        .header-icons svg { width: 26px; height: 26px; fill: none; stroke: var(--texto); stroke-width: 1.8; cursor: pointer; }

        .galeria-masonry { column-count: 2; column-gap: 12px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 640px) { .galeria-masonry { column-count: 3; } }
        @media (min-width: 1024px) { .galeria-masonry { column-count: 4; column-gap: 16px; } }
        @media (min-width: 1400px) { .galeria-masonry { column-count: 5; } }

        .pin-card { break-inside: avoid; margin-bottom: 12px; border-radius: 16px; overflow: hidden; position: relative; background: var(--bg-tarjeta); cursor: pointer; transition: transform 0.2s ease; user-select: none; -webkit-user-select: none; }
        .pin-card:active { transform: scale(0.98); }
        .pin-card img { width: 100%; display: block; border-radius: 16px; transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .pin-card img.loaded { opacity: 1; }

        .pin-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; top: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0) 100%);
            padding: 14px; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; transition: opacity 0.25s ease;
        }
        @media (max-width: 768px) { .pin-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%); } }
        .pin-card:hover .pin-overlay { opacity: 1; }
        .pin-info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .pin-title { font-size: 0.85rem; font-weight: 600; color: #fff; max-width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pin-actions { display: flex; gap: 6px; }
        
        .btn-glass {
            background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border); width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        .btn-glass:active { transform: scale(0.9); }
        .btn-glass svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 1.8; }
        .btn-glass.active svg { fill: var(--corazon); stroke: var(--corazon); }
        .btn-glass.fav-active svg { fill: var(--estrella); stroke: var(--estrella); }

        .search-container { display: none; padding: 0 10px 20px 10px; max-width: 1400px; margin: 0 auto; }
        .search-container.active { display: block; }
        .search-input { width: 100%; background: var(--bg-tarjeta); border: 1px solid var(--glass-border); padding: 14px 22px; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: rgba(255,255,255,0.2); }

        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(24, 24, 28, 0.82); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 24px; border-radius: 40px; display: flex; gap: 30px; z-index: 1000;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7); border: 1px solid var(--glass-border);
        }
        .nav-item { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 50%; }
        .nav-item svg { width: 26px; height: 26px; fill: none; stroke: var(--texto-muted); stroke-width: 1.8; transition: stroke 0.2s; }
        .nav-item.active svg { stroke: var(--texto); stroke-width: 2.2; }

        /* VISTA DETALLE */
        .vista-detalle {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-puro); z-index: 2000;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            overflow-y: auto; overflow-x: hidden;
        }
        .vista-detalle.activa { transform: translateY(0); }

        .detalle-nav-top {
            position: sticky; top: 0; background: rgba(15, 15, 17, 0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 2020;
        }

        .btn-save-pinterest {
            background: var(--pinterest-red); color: #fff; border: none; padding: 10px 20px; border-radius: 24px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
        }
        .btn-save-pinterest:active { background: var(--pinterest-hover); }

        .detalle-img-container {
            width: 100%; display: flex; justify-content: center; align-items: center;
            background: #050507; padding: 10px 0; position: relative;
        }
        .detalle-img-container img {
            max-width: 100%; max-height: 80vh; object-fit: contain; display: block;
        }

        .detalle-info-box { max-width: 750px; margin: 0 auto; width: 100%; padding: 20px; }
        .detalle-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .autor-info { display: flex; align-items: center; gap: 10px; }
        .autor-avatar { width: 40px; height: 40px; background: #3a3a42; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        .autor-name { font-weight: 600; font-size: 1rem; }
        
        .detalle-iconos-row { display: flex; gap: 12px; }

        .mas-explorar { padding: 40px 10px 120px 10px; max-width: 1400px; margin: 0 auto; border-top: 1px solid var(--glass-border); }
        .mas-explorar h3 { font-size: 1.1rem; margin-bottom: 20px; text-align: center; font-weight: 700; }

        /* BOTTOM SHEET OPCIONES */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .sheet-overlay.activo { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-sheet); border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px 20px 40px 20px; z-index: 3010; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }
        .bottom-sheet.activo { transform: translateY(0); }
        .sheet-linea { width: 36px; height: 5px; background: #444; border-radius: 5px; margin: 0 auto 20px auto; }
        .sheet-titulo { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 20px; }
        
        .tablero-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-tarjeta); border-radius: 12px; cursor: pointer; }
        .tablero-item:active { background: #2a2a32; }

        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #fff; color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 700; font-size: 0.9rem; z-index: 4000; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">M</div>
            <div class="logo">Mi Galería</div>
        </div>
        <div class="header-icons">
            <svg id="headerMsg" viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 1.886.522 3.65 1.433 5.158L2.05 21.95l4.908-1.28A9.957 9.957 0 0012 22z"/></svg>
        </div>
    </header>

    <div class="search-container" id="searchContainer">
        <input type="text" class="search-input" id="inputBuscar" placeholder="Buscar por título...">
    </div>

    <main class="galeria-masonry" id="galeriaGrid"></main>

    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" id="navHome">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M9 22V12h6v10"/></svg>
        </button>
        <button class="nav-item" id="navSearch">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="nav-item" id="navFavs">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        </button>
    </nav>

    <div class="vista-detalle" id="vistaDetalle">
        <div class="detalle-nav-top">
            <button class="btn-glass" id="btnCerrarDetalle" style="border-radius: 50%;">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <button class="btn-save-pinterest" id="btnCompartirPin">Compartir</button>
        </div>
        
        <div class="detalle-img-container" id="detalleImgContainer">
            <img id="imgDetalleSrc" src="" alt="">
        </div>

        <div class="detalle-info-box">
            <div class="detalle-meta-row">
                <div class="autor-info">
                    <div class="autor-avatar" id="autorAvatar">U</div>
                    <div>
                        <div class="autor-name" id="pinTituloReal">Título Idea</div>
                        <div style="font-size:0.8rem; color:var(--texto-muted);">Mi Colección</div>
                    </div>
                </div>
                <div class="detalle-iconos-row">
                    <button class="btn-glass" id="btnLikeDetalle">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    </button>
                    <button class="btn-glass" id="btnMenuOpciones">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="mas-explorar">
            <h3>Más imágenes de la galería</h3>
            <div class="galeria-masonry" id="galeriaExplorar"></div>
        </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay"></div>
    
    <div class="bottom-sheet" id="bottomSheetOpciones">
        <div class="sheet-linea"></div>
        <div class="sheet-titulo">Opciones de la Imagen</div>
        <div class="tablero-item" id="btnCopiarEnlace" style="margin-bottom: 8px;">
            <span>Copiar enlace de origen</span>
            <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2;"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/></svg>
        </div>
        <div class="tablero-item" id="btnDescargarDispositivo" style="color: var(--pinterest-red);">
            <span>Abrir Imagen Directa</span>
            <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:none; stroke:var(--pinterest-red); stroke-width:2;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        </div>
    </div>

    <div class="toast" id="appToast">Mensaje</div>

    <script>
        const MIS_IMAGENES = [
            { id: "img_01", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/8c66d9a76af3473ecf218224c33be9d8.gif" },
            { id: "img_02", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/636d4ef268bfc4c7bef422915a02773d.gif" },
            { id: "img_03", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/7cc728f7b3c7b3e86c8c2fdcfc52a623.gif" },
            { id: "img_04", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/fda276dafc235e1bf270a242d67f11e6.gif" },
            { id: "img_05", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/883ad7aa677e20ac592eb117178a2a53.gif" },
            { id: "img_06", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/1d08b08af331e0b3283ac3ddea072dbc.gif" },
            { id: "img_07", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/4b0c27e34355f833f4b23a0385df245d.gif" },
            { id: "img_08", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/fda00bc691cb2462be404e126bc7acef.gif" },
            { id: "img_09", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/8ab76a842d91915a4516e91949a7e507.gif" },
            { id: "img_11", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/9659c65a2f9ad5781ba426d8c09829e5.gif" },
            { id: "img_12", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/1eb846fb5162289e6510d5b85d9ce01c.gif" },
            { id: "img_13", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/dcd698c2983a470ba0b6cdb08e69f7ab.gif" },
            { id: "img_14", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/d45f3f1deb77e9d5ff53a5c583939897.gif" },
            { id: "img_15", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/38efb28f23007333a4ba62ea986af2d6.gif" },
            { id: "img_16", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/912d88930b76e726389fbaa8bdac6e98.gif" },
            { id: "img_17", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/3ae237c21bf0105aade7b834fae4077f.gif" },
            { id: "img_18", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/d66894a09c9f1b022b2dfec8473c3dd5.gif" },
            { id: "img_19", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/fae169ad863ec8b9319f43f202d22b20.gif" },
            { id: "img_20", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/e3d8ec2c4c0a2d4fb70acb8c6093dad6.gif" },
            { id: "img_21", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/ff8f4c27ec67982656c9777e8e6c62b2.gif" },
            { id: "img_22", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/4dd4de9f2b0a01659a870fe4e7b02463.gif" },
            { id: "img_23", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/ff04d8b078de3ea5d1c4178b25e006da.gif" },
            { id: "img_24", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/a142f4836056db50861654df0521c00a.gif" },
            { id: "img_25", titulo: "DE TELEGRAM", url: "https://i.picasion.com/pic93/596e5f98f503b99fd6bd107f76e85960.gif" },
        ];

        // EL CONTENIDO AHORA ES ALEATORIO CADA VEZ QUE ENTRAS
        const IMAGENES_ALEATORIAS = [...MIS_IMAGENES].sort(() => Math.random() - 0.5);

        let db;
        let modoFavoritos = false;
        let listadoFavoritosLocal = [];
        let fotoActual = null;

        const SVG_LIKE = `<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
        const SVG_FAV = `<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`;

        const dbRequest = indexedDB.open('MiGaleriaLocalDB', 1);
        dbRequest.onupgradeneeded = (e) => {
            let database = e.target.result;
            if (!database.objectStoreNames.contains('user_likes')) database.createObjectStore('user_likes', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('user_favorites')) database.createObjectStore('user_favorites', { keyPath: 'id' });
        };
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            actualizarDatosYRenderizar();
        };

        function guardarDato(almacen, id, activo) {
            if (!db) return;
            let tx = db.transaction(almacen, 'readwrite');
            if (activo) tx.objectStore(almacen).put({ id: id });
            else tx.objectStore(almacen).delete(id);
            tx.oncomplete = actualizarDatosYRenderizar;
        }

        function actualizarDatosYRenderizar() {
            if (!db) return;
            db.transaction('user_favorites', 'readonly').objectStore('user_favorites').getAll().onsuccess = (e) => {
                listadoFavoritosLocal = e.target.result.map(item => item.id);
                db.transaction('user_likes', 'readonly').objectStore('user_likes').getAll().onsuccess = (e2) => {
                    const likesLocal = e2.target.result.map(item => item.id);
                    renderizarGridPrincipal(likesLocal);
                    
                    if (fotoActual) {
                        const btn = document.getElementById('btnLikeDetalle');
                        if (likesLocal.includes(fotoActual.id)) btn.classList.add('active');
                        else btn.classList.remove('active');
                    }
                };
            };
        }

        function renderizarGridPrincipal(likesLocal) {
            const grid = document.getElementById('galeriaGrid');
            const busqueda = document.getElementById('inputBuscar').value.toLowerCase().trim();
            grid.innerHTML = '';

            IMAGENES_ALEATORIAS.forEach(foto => {
                if (modoFavoritos && !listadoFavoritosLocal.includes(foto.id)) return;
                if (busqueda && !foto.titulo.toLowerCase().includes(busqueda)) return;

                const esLike = likesLocal.includes(foto.id);
                const esFav = listadoFavoritosLocal.includes(foto.id);

                const card = document.createElement('div');
                card.className = 'pin-card skeleton';
                card.innerHTML = `
                    <img src="${foto.url}" alt="${foto.titulo}">
                    <div class="pin-overlay">
                        <div class="pin-info-row">
                            <span class="pin-title">${foto.titulo}</span>
                            <div class="pin-actions">
                                <button class="btn-glass btn-like ${esLike ? 'active' : ''}" data-id="${foto.id}">${SVG_LIKE}</button>
                                <button class="btn-glass btn-fav ${esFav ? 'fav-active' : ''}" data-id="${foto.id}">${SVG_FAV}</button>
                            </div>
                        </div>
                    </div>
                `;

                const img = card.querySelector('img');
                img.addEventListener('load', () => {
                    card.classList.remove('skeleton');
                    img.classList.add('loaded');
                });

                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.btn-glass')) {
                        abrirVistaDetalle(foto);
                    }
                });

                // EVENTO DE MANTENER PRESIONADO (LONG PRESS) PARA CELULARES
                let tiempoPresionado;
                card.addEventListener('touchstart', () => {
                    tiempoPresionado = setTimeout(() => {
                        fotoActual = foto;
                        abrirMenuOpciones();
                    }, 500);
                }, { passive: true });
                card.addEventListener('touchend', () => clearTimeout(tiempoPresionado));
                card.addEventListener('touchmove', () => clearTimeout(tiempoPresionado));

                // CLIC DERECHO EN PC HACE LO MISMO
                card.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    fotoActual = foto;
                    abrirMenuOpciones();
                });

                card.querySelector('.btn-like').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    btn.classList.toggle('active');
                    guardarDato('user_likes', foto.id, btn.classList.contains('active'));
                });

                card.querySelector('.btn-fav').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    btn.classList.toggle('fav-active');
                    guardarDato('user_favorites', foto.id, btn.classList.contains('fav-active'));
                });

                grid.appendChild(card);
            });
        }

        function abrirVistaDetalle(foto) {
            fotoActual = foto;
            document.getElementById('imgDetalleSrc').src = foto.url;
            document.getElementById('pinTituloReal').textContent = foto.titulo;
            document.getElementById('autorAvatar').textContent = foto.titulo.charAt(0).toUpperCase();
            
            document.getElementById('bottomNav').style.opacity = '0';
            document.getElementById('bottomNav').style.pointerEvents = 'none';

            renderizarExplorarMas(foto.id);

            document.getElementById('vistaDetalle').classList.add('activa');
            document.body.style.overflow = 'hidden';
            actualizarDatosYRenderizar();
        }

        document.getElementById('btnCerrarDetalle').addEventListener('click', () => {
            document.getElementById('vistaDetalle').classList.remove('activa');
            document.body.style.overflow = 'auto';
            document.getElementById('bottomNav').style.opacity = '1';
            document.getElementById('bottomNav').style.pointerEvents = 'auto';
            fotoActual = null;
        });

        // EL BOTÓN DE LIKE EN EL APARTADO DE DETALLES AHORA SÍ FUNCIONA PERFECTAMENTE
        document.getElementById('btnLikeDetalle').addEventListener('click', (e) => {
            if (!fotoActual) return;
            const btn = e.currentTarget;
            btn.classList.toggle('active');
            guardarDato('user_likes', fotoActual.id, btn.classList.contains('active'));
        });

        function renderizarExplorarMas(idExcluido) {
            const grid = document.getElementById('galeriaExplorar');
            grid.innerHTML = '';
            const recomendados = MIS_IMAGENES.filter(f => f.id !== idExcluido).sort(() => Math.random() - 0.5);
            
            recomendados.forEach(foto => {
                const card = document.createElement('div');
                card.className = 'pin-card skeleton';
                card.innerHTML = `<img src="${foto.url}" loading="lazy">`;
                const img = card.querySelector('img');
                img.addEventListener('load', () => { card.classList.remove('skeleton'); img.classList.add('loaded'); });
                
                card.addEventListener('click', () => {
                    document.getElementById('vistaDetalle').scrollTo({ top: 0, behavior: 'smooth' });
                    abrirVistaDetalle(foto);
                });
                grid.appendChild(card);
            });
        }

        // SISTEMA DE COMPARTIR NATIVO ESTILO CINEFLUX
        document.getElementById('btnCompartirPin').addEventListener('click', async () => {
            if(!fotoActual) return;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: fotoActual.titulo,
                        text: '¡Mira este contenido en mi galería!',
                        url: fotoActual.url
                    });
                } catch (err) {
                    console.log("Compartir cancelado o error:", err);
                }
            } else {
                // Alternativa automática si el navegador no soporta el menú nativo
                navigator.clipboard.writeText(fotoActual.url);
                mostrarToast("Tu navegador no soporta compartir, ¡Enlace copiado!");
            }
        });

        const overlay = document.getElementById('sheetOverlay');
        const sheetOpciones = document.getElementById('bottomSheetOpciones');

        function abrirMenuOpciones() {
            overlay.classList.add('activo');
            sheetOpciones.classList.add('activo');
        }

        document.getElementById('btnMenuOpciones').addEventListener('click', abrirMenuOpciones);

        // SOPORTE DE MANTENER PRESIONADO EN LA IMAGEN DE LA VISTA DETALLE
        const contenedorImgDetalle = document.getElementById('detalleImgContainer');
        let tiempoPresionadoDetalle;
        contenedorImgDetalle.addEventListener('touchstart', () => {
            tiempoPresionadoDetalle = setTimeout(() => {
                abrirMenuOpciones();
            }, 500);
        }, { passive: true });
        contenedorImgDetalle.addEventListener('touchend', () => clearTimeout(tiempoPresionadoDetalle));
        contenedorImgDetalle.addEventListener('touchmove', () => clearTimeout(tiempoPresionadoDetalle));
        contenedorImgDetalle.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            abrirMenuOpciones();
        });

        function cerrarCajasFlotantes() {
            overlay.classList.remove('activo');
            sheetOpciones.classList.remove('activo');
        }

        overlay.addEventListener('click', cerrarCajasFlotantes);

        document.getElementById('btnCopiarEnlace').addEventListener('click', () => {
            if(fotoActual) {
                navigator.clipboard.writeText(fotoActual.url).then(() => {
                    cerrarCajasFlotantes();
                    mostrarToast("¡Enlace copiado al portapapeles!");
                });
            }
        });

        document.getElementById('btnDescargarDispositivo').addEventListener('click', () => {
            if(!fotoActual) return;
            cerrarCajasFlotantes();
            window.open(fotoActual.url, '_blank');
        });

        document.getElementById('navHome').addEventListener('click', () => {
             conmutarMenuInferior('navHome'); modoFavoritos = false; document.getElementById('searchContainer').classList.remove('active'); actualizarDatosYRenderizar();
        });
        document.getElementById('navSearch').addEventListener('click', () => {
            conmutarMenuInferior('navSearch'); modoFavoritos = false; document.getElementById('searchContainer').classList.add('active'); document.getElementById('inputBuscar').focus(); actualizarDatosYRenderizar();
        });
        document.getElementById('navFavs').addEventListener('click', () => {
            conmutarMenuInferior('navFavs'); modoFavoritos = true; document.getElementById('searchContainer').classList.remove('active'); actualizarDatosYRenderizar();
        });

        function conmutarMenuInferior(id) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('inputBuscar').addEventListener('input', () => actualizarDatosYRenderizar());

        function mostrarToast(msg) {
            const t = document.getElementById('appToast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
